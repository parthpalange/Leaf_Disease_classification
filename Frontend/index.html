<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered crop disease detection using ResNet50 deep learning model.">
    <title>Crop Disease Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <span class="logo">🌿</span>
        <h1>Crop Disease Detector</h1>
        <p class="subtitle">Upload a leaf image to detect diseases using AI</p>
    </div>

    <!-- Drag & Drop Upload Zone -->
    <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📂</div>
        <p class="drop-text">Drag & Drop your image here</p>
        <p class="drop-sub">or</p>
        <label for="imageInput" class="browse-btn">Browse File</label>
        <input type="file" id="imageInput" accept="image/*" hidden>
        <p class="drop-hint">Supports: JPG, PNG, WEBP</p>
    </div>

    <!-- Image Preview -->
    <div class="preview-box" id="previewBox" style="display:none;">
        <img id="preview" src="" alt="Uploaded leaf image preview" />
        <button class="remove-btn" id="removeBtn">✕ Remove</button>
    </div>

    <!-- Predict Button -->
    <button class="predict-btn" id="predictBtn" onclick="uploadImage()" disabled>
        🔍 Predict Disease
    </button>

    <!-- Result Card -->
    <div class="result-card" id="resultCard" style="display:none;">
        <div class="result-label">Detection Result</div>
        <div class="result-disease" id="resultDisease">—</div>
        <div class="confidence-section">
            <div class="confidence-header">
                <span>Model Confidence</span>
                <span id="confidenceText">0%</span>
            </div>
            <div class="confidence-bar-bg">
                <div class="confidence-bar" id="confidenceBar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="spinner-wrap" id="spinnerWrap" style="display:none;">
        <div class="spinner"></div>
        <p>Analyzing image...</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
